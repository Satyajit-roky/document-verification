<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Document Verification</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-section { background: #f5f5f5; padding: 20px; border-radius: 8px; margin: 20px 0; }
        .result { margin-top: 20px; padding: 10px; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
        input, select { padding: 8px; margin: 5px; width: 200px; }
    </style>
</head>
<body>
    <h1>🧪 Document Verification Test Page</h1>

    <div class="test-section">
        <h2>Test API Connectivity</h2>
        <button onclick="testAPIConnection()">Test API Connection</button>
        <div id="apiResult" class="result"></div>
    </div>

    <div class="test-section">
        <h2>Manual Verification Test</h2>
        <form id="testForm">
            <div>
                <label>Name: <input type="text" id="testName" value="John Smith" required></label><br>
                <label>Father Name: <input type="text" id="testFather" value="Robert Smith" required></label><br>
                <label>Percentage: <input type="number" id="testPercentage" value="85.5" step="0.1" required></label><br>
                <label>Document: <input type="file" id="testDocument" accept=".txt,.pdf,.jpg,.png" required></label><br>
            </div>
            <button type="submit">Test Verification</button>
        </form>
        <div id="verificationResult" class="result"></div>
    </div>

    <div class="test-section">
        <h2>Quick Test with Sample Data</h2>
        <button onclick="quickTest()">Quick Test (No File Upload)</button>
        <div id="quickResult" class="result"></div>
    </div>

    <script>
        async function testAPIConnection() {
            const resultDiv = document.getElementById('apiResult');
            resultDiv.innerHTML = 'Testing...';

            try {
                const response = await fetch('/api/verified');
                const data = await response.json();

                resultDiv.className = 'result success';
                resultDiv.innerHTML = `
                    <h3>✅ API Connection Successful!</h3>
                    <p>Server is responding correctly.</p>
                    <p>Verified documents count: ${data.length}</p>
                `;
            } catch (error) {
                resultDiv.className = 'result error';
                resultDiv.innerHTML = `
                    <h3>❌ API Connection Failed</h3>
                    <p>Error: ${error.message}</p>
                    <p>Make sure the Flask server is running on port 5000.</p>
                `;
            }
        }

        document.getElementById('testForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const resultDiv = document.getElementById('verificationResult');
            resultDiv.innerHTML = 'Processing verification...';

            const formData = new FormData();
            formData.append('document', document.getElementById('testDocument').files[0]);
            formData.append('name', document.getElementById('testName').value);
            formData.append('fatherName', document.getElementById('testFather').value);
            formData.append('percentage', document.getElementById('testPercentage').value);

            try {
                const response = await fetch('/api/verify', {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();

                if (response.ok) {
                    resultDiv.className = 'result success';
                    let resultHtml = `
                        <h3>✅ Verification Completed!</h3>
                        <p><strong>Overall Status:</strong> <span style="color: ${result.match ? 'green' : 'red'}">${result.status}</span></p>
                        <p><strong>Document Type:</strong> ${result.document_type}</p>
                        <p><strong>Overall Match:</strong> ${result.match ? '✅ Yes' : '❌ No'}</p>

                        <h4>📋 Detailed Field Analysis:</h4>
                        <div style="background: #f8f9fa; padding: 10px; border-radius: 5px; margin: 10px 0;">
                            <h5>👤 Name Verification:</h5>
                            <p><strong>You Provided:</strong> ${result.verification_results.name.user_provided}</p>
                            <p><strong>Found in Document:</strong> ${result.verification_results.name.extracted.join(', ') || 'None found'}</p>
                            <p><strong>Best Match:</strong> ${result.verification_results.name.matched_value || 'None'}</p>
                            <p><strong>Match Status:</strong> <span style="color: ${result.verification_results.name.status === 'Match' ? 'green' : result.verification_results.name.status === 'Partial Match' ? 'orange' : 'red'}">${result.verification_results.name.status}</span> (${result.verification_results.name.match_score}%)</p>
                        </div>

                        <div style="background: #f8f9fa; padding: 10px; border-radius: 5px; margin: 10px 0;">
                            <h5>👨 Father Name Verification:</h5>
                            <p><strong>You Provided:</strong> ${result.verification_results.father_name.user_provided}</p>
                            <p><strong>Found in Document:</strong> ${result.verification_results.father_name.extracted.join(', ') || 'None found'}</p>
                            <p><strong>Best Match:</strong> ${result.verification_results.father_name.matched_value || 'None'}</p>
                            <p><strong>Match Status:</strong> <span style="color: ${result.verification_results.father_name.status === 'Match' ? 'green' : result.verification_results.father_name.status === 'Partial Match' ? 'orange' : 'red'}">${result.verification_results.father_name.status}</span> (${result.verification_results.father_name.match_score}%)</p>
                        </div>

                        <div style="background: #f8f9fa; padding: 10px; border-radius: 5px; margin: 10px 0;">
                            <h5>📊 Percentage Verification:</h5>
                            <p><strong>You Provided:</strong> ${result.verification_results.percentage.user_provided}%</p>
                            <p><strong>Found in Document:</strong> ${result.verification_results.percentage.extracted.join('%, ') || 'None found'}</p>
                            <p><strong>Best Match:</strong> ${result.verification_results.percentage.matched_value || 'None'}%</p>
                            <p><strong>Match Status:</strong> <span style="color: ${result.verification_results.percentage.status === 'Match' ? 'green' : result.verification_results.percentage.status === 'Partial Match' ? 'orange' : 'red'}">${result.verification_results.percentage.status}</span> (${result.verification_results.percentage.match_score}%)</p>
                        </div>

                        <h4>📄 Extracted Document Information:</h4>
                        <div style="background: #e9ecef; padding: 10px; border-radius: 5px; margin: 10px 0; font-size: 0.9em;">
                            <p><strong>All Names Found:</strong> ${result.extracted_details.names.join(', ') || 'None'}</p>
                            <p><strong>All Percentages Found:</strong> ${result.extracted_details.percentages.join('%, ') || 'None'}</p>
                            <p><strong>Document Numbers:</strong> ${result.extracted_details.document_numbers.join(', ') || 'None'}</p>
                            <p><strong>Dates Found:</strong> ${result.extracted_details.dates.join(', ') || 'None'}</p>
                        </div>
                    `;

                    // Add recommendations if any
                    if (result.recommendations) {
                        let recommendations = [];
                        if (result.recommendations.name) recommendations.push(result.recommendations.name);
                        if (result.recommendations.father_name) recommendations.push(result.recommendations.father_name);
                        if (result.recommendations.percentage) recommendations.push(result.recommendations.percentage);

                        if (recommendations.length > 0) {
                            resultHtml += `
                                <h4>💡 Suggestions for Correction:</h4>
                                <div style="background: #fff3cd; border: 1px solid #ffeaa7; padding: 10px; border-radius: 5px; margin: 10px 0;">
                                    <ul>
                                        ${recommendations.map(rec => `<li>${rec}</li>`).join('')}
                                    </ul>
                                </div>
                            `;
                        }
                    }

                    // Add QR code if available
                    if (result.qr_code) {
                        resultHtml += `<h4>📱 Verification QR Code:</h4><img src="${result.qr_code}" style="max-width: 150px; margin-top: 10px;">`;
                    }

                    resultDiv.innerHTML = resultHtml;
                } else {
                    resultDiv.className = 'result error';
                    resultDiv.innerHTML = `
                        <h3>❌ Verification Error</h3>
                        <p>${result.error}</p>
                    `;
                }
            } catch (error) {
                resultDiv.className = 'result error';
                resultDiv.innerHTML = `
                    <h3>❌ Network Error</h3>
                    <p>Failed to connect to verification service.</p>
                    <p>Error: ${error.message}</p>
                `;
            }
        });

        async function quickTest() {
            const resultDiv = document.getElementById('quickResult');
            resultDiv.innerHTML = 'Running quick test...';

            try {
                // Test with sample data
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: 'test@example.com',
                        password: 'test123'
                    })
                });

                const result = await response.json();

                resultDiv.className = 'result success';
                resultDiv.innerHTML = `
                    <h3>✅ Quick Test Successful!</h3>
                    <p>Server is responding to API calls.</p>
                    <p>Response: ${result.message || result.error || 'OK'}</p>
                `;
            } catch (error) {
                resultDiv.className = 'result error';
                resultDiv.innerHTML = `
                    <h3>❌ Quick Test Failed</h3>
                    <p>Error: ${error.message}</p>
                `;
            }
        }

        // Auto-test on page load
        window.addEventListener('load', () => {
            setTimeout(testAPIConnection, 1000);
        });
    </script>
</body>
</html>
